<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Review Teller</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f0f2f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #ffffff;
      border-radius: 24px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 4px 32px rgba(100, 80, 200, 0.08);
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .sparkle {
      font-size: 2rem;
      display: block;
      margin-bottom: 0.5rem;
    }

    .header h1 {
      font-size: 2.2rem;
      font-weight: 600;
      color: #6C63FF;
      margin-bottom: 0.4rem;
    }

    .header p {
      color: #888;
      font-size: 0.95rem;
    }

    textarea {
      width: 100%;
      border: 1.5px solid #e0e0e0;
      border-radius: 16px;
      padding: 1rem 1.2rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      color: #333;
      resize: none;
      height: 140px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 1rem;
    }

    textarea:focus {
      border-color: #6C63FF;
    }

    textarea::placeholder {
      color: #bbb;
    }

    button {
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #a084e8, #6C63FF);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-bottom: 1.2rem;
    }

    button:hover { opacity: 0.92; }
    button:active { transform: scale(0.98); }

    .result-box {
      border-radius: 16px;
      padding: 1.5rem 1.2rem 1.2rem;
      text-align: center;
      display: none;
    }

    .result-box.positive {
      background: #edfaf3;
    }

    .result-box.negative {
      background: #fef1f1;
    }

    .result-emoji {
      font-size: 2.5rem;
      display: block;
      margin-bottom: 0.5rem;
    }

    .result-label {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 0.8rem;
    }

    .result-box.positive .result-label { color: #2d9e6b; }
    .result-box.negative .result-label { color: #e05555; }



    .error-message {
      color: #e05555;
      font-size: 0.88rem;
      margin-top: -0.5rem;
      margin-bottom: 0.8rem;
      padding: 0.6rem 1rem;
      background: #fef1f1;
      border-radius: 10px;
      display: none;
    }

    textarea.invalid {
      border-color: #e05555;
    }

    .hint {
      text-align: center;
      color: #aaa;
      font-size: 0.82rem;
      margin-top: 1.2rem;
    }

    .hint kbd {
      background: #f0f0f0;
      border: 1px solid #ddd;
      border-radius: 5px;
      padding: 1px 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      color: #555;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <svg width="44" height="40" viewBox="0 0 44 40" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:block; margin: 0 auto 0.5rem;">
      <defs>
        <linearGradient id="bubbleGrad" x1="0" y1="0" x2="44" y2="40" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#a084e8"/>
          <stop offset="100%" stop-color="#6C63FF"/>
        </linearGradient>
      </defs>
      <rect x="0" y="0" width="44" height="32" rx="10" fill="url(#bubbleGrad)"/>
      <polygon points="10,32 4,40 20,32" fill="url(#bubbleGrad)"/>
      <circle cx="14" cy="16" r="3" fill="white"/>
      <circle cx="22" cy="16" r="3" fill="white"/>
      <circle cx="30" cy="16" r="3" fill="white"/>
    </svg>
    <h1>Review Teller</h1>
    <p>Find out if your review is good or bad</p>
  </div>

  <textarea id="reviewInput" placeholder="Type or paste a review here..."></textarea>

  <div class="error-message" id="errorMsg"></div>

  <button onclick="analyse()">Analyse</button>

  <div class="result-box" id="resultBox">
    <span class="result-emoji" id="resultEmoji"></span>
    <div class="result-label" id="resultLabel"></div>

  </div>

  <p class="hint">Press <kbd>Enter</kbd> to analyse</p>
</div>

<script>
  // sends the review text to Flask and gets back the result
  async function analyse() {
    const textBox = document.getElementById("reviewInput");
    const errorMsg = document.getElementById("errorMsg");
    const text = textBox.value.trim();

    // reset any previous error
    textBox.classList.remove("invalid");
    errorMsg.style.display = "none";
    errorMsg.textContent = "";

    // check if empty
    if (!text) {
      showError(textBox, errorMsg, "Please enter a review before analysing.");
      return;
    }

    // check if too short (less than 5 characters)
    if (text.length < 5) {
      showError(textBox, errorMsg, "Your review is too short. Please enter at least 5 characters.");
      return;
    }

    // check if it's only special characters like $#@~ with no real words
    const hasRealWords = /[a-zA-Z]{2,}/.test(text);
    if (!hasRealWords) {
      showError(textBox, errorMsg, "Please enter a valid review with actual words.");
      return;
    }

    // check if it's mostly symbols (less than 50% letters)
    const letterCount = (text.match(/[a-zA-Z]/g) || []).length;
    if (letterCount / text.length < 0.5) {
      showError(textBox, errorMsg, "Please enter a valid review with actual words.");
      return;
    }

    // all good — calling the Flask /predict route
    const response = await fetch("/predict", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text: text })
    });

    const data = await response.json();
    showResult(data.result);
  }

  function showError(textBox, errorMsg, message) {
    textBox.classList.add("invalid");
    errorMsg.textContent = message;
    errorMsg.style.display = "block";
    document.getElementById("resultBox").style.display = "none";
  }

  function showResult(result) {
    const box = document.getElementById("resultBox");
    const emoji = document.getElementById("resultEmoji");
    const label = document.getElementById("resultLabel");

    box.className = "result-box " + (result === "Positive" ? "positive" : "negative");
    emoji.textContent = result === "Positive" ? "😊" : "😞";
    label.textContent = result === "Positive" ? "Positive review" : "Negative review";
    box.style.display = "block";


  }

  // allow pressing Enter to submit
  document.getElementById("reviewInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      analyse();
    }
  });

  // clear error when user starts typing again
  document.getElementById("reviewInput").addEventListener("input", function() {
    this.classList.remove("invalid");
    document.getElementById("errorMsg").style.display = "none";
  });
</script>

</body>
</html>
